name: Melampo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: |
          pytest -q

      - name: Validate enterprise CLI commands
        run: |
          melampo-decision-record > /tmp/melampo_decision_record.json
          melampo-weaviate-schema > /tmp/melampo_weaviate_schema.json
          python -m json.tool /tmp/melampo_decision_record.json > /dev/null
          python -m json.tool /tmp/melampo_weaviate_schema.json > /dev/null
