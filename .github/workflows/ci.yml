name: Melampo CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: Enterprise smoke (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate import boundaries
        run: |
          python - <<'PY'
          import melampo
          from melampo.cli import main_decision_record, main_weaviate_schema
          from melampo.orchestration.model_capability_registry import ModelCapabilityRegistry
          from melampo.memory.weaviate_schema import MelampoWeaviateSchema
          assert "build_default_runtime" in melampo.__all__
          assert ModelCapabilityRegistry.build_default().decision_record()["final_diagnostic_authority"] == "MelampoDiagnosticOrchestrator"
          assert "ClinicalCase" in MelampoWeaviateSchema().class_names()
          PY

      - name: Run enterprise smoke tests
        run: |
          pytest -q \
            tests/test_enterprise_orchestration.py \
            tests/test_enterprise_adapters.py \
            tests/test_validation_primitives.py

      - name: Validate enterprise CLI commands
        run: |
          melampo-decision-record > /tmp/melampo_decision_record.json
          melampo-weaviate-schema > /tmp/melampo_weaviate_schema.json
          python -m json.tool /tmp/melampo_decision_record.json > /dev/null
          python -m json.tool /tmp/melampo_weaviate_schema.json > /dev/null
